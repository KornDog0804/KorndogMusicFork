name: Build KornDog APK

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: -Xmx3g -XX:MaxMetaspaceSize=512m

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Cache ~/.gradle/wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}
          restore-keys: gradle-wrapper-${{ runner.os }}

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Create Keystore Directory
        run: |
          mkdir -p android/app
          echo "${{ secrets.KORNDOG_KEYSTORE }}" | base64 -d > android/app/korndog-release.keystore
          echo "=== Keystore created ==="
          ls -lh android/app/korndog-release.keystore

      - name: Reduce Gradle Memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      - name: Setup Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Patch build.gradle for Absolute Keystore Path
        run: |
          KEYSTORE_PATH="$(cd android/app && pwd)/korndog-release.keystore"
          echo "Using keystore: $KEYSTORE_PATH"
          sed -i "s|storeFile file('korndog-release.keystore')|storeFile file('$KEYSTORE_PATH')|g" android/app/build.gradle
          grep -A 3 "release {" android/app/build.gradle | head -5

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --stacktrace

      - name: Find APK Files
        run: |
          echo "=== All APK files ==="
          find android/app/build/outputs -type f -name "*.apk" 2>/dev/null
          echo ""
          echo "=== APK count ==="
          find android/app/build/outputs -type f -name "*release.apk" | wc -l

      - name: Prepare Release
        run: |
          mkdir -p release-apks
          echo "=== Copying signed APKs ==="
          find android/app/build/outputs -type f -name "*arm64-v8a*release.apk" ! -name "*unsigned*" -exec cp {} release-apks/ \;
          echo ""
          echo "=== Contents of release-apks ==="
          ls -lh release-apks/ || echo "ERROR: No APKs found"

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          tag_name: build-${{ github.run_id }}
          name: "KornDog Build #${{ github.run_number }}"
          body: |
            🤘 **KornDog APK Build**
            
            **Install:** `adb install -r app-arm64-v8a-release.apk`
            **Features:** Cast to TV, Auto-play fix, Audio norm, Easter egg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Complete
        run: echo "✅ Signed APK ready"
