name: Build KornDog APK (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: -Xmx3g -XX:MaxMetaspaceSize=512m

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Cache ~/.gradle/wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}
          restore-keys: gradle-wrapper-${{ runner.os }}

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Reduce Gradle Memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      - name: Setup Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build APK (Unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --stacktrace

      - name: Find APK Files
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs -type f -name "*.apk"

      - name: Prepare Release
        run: |
          mkdir -p release-apks
          echo "=== Copying unsigned APK (ARM64 only) ==="
          find android/app/build/outputs -type f -name "*arm64-v8a*unsigned*.apk" -exec cp {} release-apks/ \;
          echo ""
          echo "=== Contents of release-apks ==="
          ls -lh release-apks/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          tag_name: build-${{ github.run_id }}
          name: "KornDog Build #${{ github.run_number }} (Unsigned)"
          body: |
            🤘 **KornDog APK Build (UNSIGNED)**
            
            ⚠️ This is an unsigned APK for development only.
            
            **Install:** `adb install -r app-arm64-v8a-release-unsigned.apk`
            **Note:** You'll need to uninstall the signed version first.
            
            Once you set up a new signing key, use the regular build.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Complete
        run: echo "✅ Unsigned APK ready for testing"
