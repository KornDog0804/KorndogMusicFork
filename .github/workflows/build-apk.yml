name: Build KornDog APK (7 Minute Mode)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Xmx7g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
      ORG_GRADLE_PROJECT_org.gradle.daemon: true
      ORG_GRADLE_PROJECT_org.gradle.parallel: true
      ORG_GRADLE_PROJECT_org.gradle.caching: true
      ORG_GRADLE_PROJECT_org.gradle.configureondemand: true
      ORG_GRADLE_PROJECT_org.gradle.configuration-cache: true

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android Native
        uses: actions/cache@v4
        with:
          path: |
            android/app/.cxx
            android/build
            android/app/build
          key: native-${{ runner.os }}-${{ hashFiles('android/**/*.kt', 'android/**/*.java', 'android/**/*.xml') }}
          restore-keys: |
            native-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Detect Android Folder
        id: androidcheck
        run: |
          if [ -d android ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Prebuild ONLY if Needed
        if: steps.androidcheck.outputs.exists == 'false'
        run: yarn expo prebuild -p android --no-install

      - name: Setup Signing
        run: |
          echo 'PASTE_YOUR_BASE64_KEYSTORE_HERE' | base64 -d > android/app/korndog-release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Fast Build APK
        run: |
          cd android
          ./gradlew assembleRelease \
          --build-cache \
          --parallel \
          --daemon \
          --configure-on-demand \
          --configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
