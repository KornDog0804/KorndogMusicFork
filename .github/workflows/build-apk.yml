name: Build KornDog APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Bundle JS
        run: yarn bundle:es

      - name: Prebuild Android
        run: yarn expo prebuild -p android --clean --no-install

      - name: Patch android/build.gradle
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext {
                  buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
                  minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
                  compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
                  targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
                  kotlinVersion = findProperty('android.kotlinVersion') ?: '2.1.20'
                  ndkVersion = findProperty('android.ndkVersion') ?: '27.1.12297006'
                  hermesEnabled = (findProperty('hermesEnabled') ?: 'true').toBoolean()
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath('com.android.tools.build:gradle')
                  classpath("com.facebook.react:react-native-gradle-plugin")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
              }
          }
          allprojects {
              repositories {
                  maven { url 'https://jitpack.io' }
                  google()
                  mavenCentral()
                  maven { url "$rootDir/../node_modules/react-native/android" }
              }
          }
          EOF

      - name: Patch android/gradle.properties
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx7g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          org.gradle.caching=false
          kotlin.incremental=false
          android.useAndroidX=true
          android.enableJetifier=true
          android.nonTransitiveRClass=true
          hermesEnabled=true
          EOF

      - name: Patch android/app/build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: "com.android.application"
          apply plugin: "org.jetbrains.kotlin.android"
          apply plugin: "com.facebook.react"

          project.ext.hermesEnabled = (findProperty('hermesEnabled') ?: 'true').toBoolean()

          def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

          react {
              entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
              reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
              hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
              codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

              enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
              cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
              bundleCommand = "export:embed"

              autolinkLibrariesWithApp()
          }

          def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()
          def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

          ext.abiCodes = ['arm64-v8a': 4]

          android {
              ndkVersion rootProject.ext.ndkVersion
              buildToolsVersion rootProject.ext.buildToolsVersion
              compileSdk rootProject.ext.compileSdkVersion

              namespace 'jp.nonbili.noutube'

              defaultConfig {
                  applicationId 'jp.nonbili.noutube'
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 49
                  versionName "0.5.0"

                  buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
                  resourceConfigurations += ["en", "de", "fr", "id", "b+pt+BR", "ru", "b+zh+Hans"]

              }

              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
                  release {
                      storeFile file('korndog-release.keystore')
                      storePassword 'KornDog2024!'
                      keyAlias 'korndog'
                      keyPassword 'KornDog2024!'
                  }
              }

              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
                  release {
                      signingConfig signingConfigs.release
                      def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
                      shrinkResources enableShrinkResources.toBoolean()
                      minifyEnabled enableMinifyInReleaseBuilds
                      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
                      def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
                      crunchPngs enablePngCrunchInRelease.toBoolean()
                  }
              }

              packaging {
                  jniLibs {
                      useLegacyPackaging = true
                      keepDebugSymbols += [
                          "**/libffmpeg.zip.so",
                          "**/libpython.zip.so"
                      ]
                  }
                  resources {
                      excludes += [
                          "META-INF/LICENSE*",
                          "META-INF/NOTICE*",
                          "META-INF/DEPENDENCIES",
                          "META-INF/AL2.0",
                          "META-INF/LGPL2.1",
                          "META-INF/*.kotlin_module",
                          "META-INF/INDEX.LIST",
                          "META-INF/io.netty.versions.properties"
                      ]
                  }
              }

              androidResources {
                  ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
              }

              dependenciesInfo {
                  includeInApk = false
                  includeInBundle = false
              }

              splits {
                  abi {
                      reset()
                      enable true
                      include "arm64-v8a"
                      universalApk false
                  }
              }

              android.applicationVariants.configureEach { variant ->
                  variant.outputs.each { output ->
                      def abi = output.getFilter(com.android.build.OutputFile.ABI)
                      if (abi == "arm64-v8a") {
                          output.versionCodeOverride = (100 * project.android.defaultConfig.versionCode) + 4
                      }
                  }
              }
          }

          dependencies {
              implementation("com.facebook.react:react-android")

              def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true"
              def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true"
              def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true"

              if (isGifEnabled) {
                  implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
              }
              if (isWebpEnabled) {
                  implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
                  if (isWebpAnimatedEnabled) {
                      implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
                  }
              }
              if (project.ext.hermesEnabled) {
                  implementation("com.facebook.react:hermes-android")
              } else {
                  implementation jscFlavor
              }
          }
          EOF

      - name: Patch expo-modules-core hermesEnabled
        run: |
          EXPO_CORE=$(find node_modules/expo-modules-core/android -name "build.gradle" | head -1)
          if [ -f "$EXPO_CORE" ]; then
            sed -i 's/project(\":app\")\.hermesEnabled/(findProperty("hermesEnabled") ?: "true").toBoolean()/g' "$EXPO_CORE"
            sed -i 's/project('"'"':app'"'"')\.hermesEnabled/(findProperty("hermesEnabled") ?: "true").toBoolean()/g' "$EXPO_CORE"
            echo "Patched expo-modules-core build.gradle"
            grep -n "hermes" "$EXPO_CORE"
          fi

      - name: Setup signing
        run: |
          echo '' | base64 -d > android/app/korndog-release.keystore

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx7g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"
        env:
          GRADLE_OPTS: "-Xmx7g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
