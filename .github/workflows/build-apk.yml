name: Build KornDog APK Temp Installable

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-temp-installable
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
            ~/.cache/metro
            .expo
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Prebuild Android If Needed
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --no-install
          fi

      - name: Setup Gradle Memory
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.caching=true
          kotlin.incremental=true
          EOF

      - name: Force Release To Use Debug Signing
        run: |
          python3 - << 'PY'
          from pathlib import Path

          p = Path("android/app/build.gradle")
          s = p.read_text()

          s = s.replace("signingConfig signingConfigs.release", "signingConfig signingConfigs.debug")

          p.write_text(s)

          print("---- signing check ----")
          for i, line in enumerate(s.splitlines(), 1):
              if "signingConfig" in line or "signingConfigs" in line:
                  print(f"{i}: {line}")
          PY

      - name: Build Installable Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --stacktrace

      - name: Find APK Files
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Prepare Installable APK
        run: |
          rm -rf release-apks
          mkdir -p release-apks
          find android/app/build/outputs -type f -name "*release*.apk" ! -name "*unsigned*" -exec cp {} release-apks/ \;
          echo "=== Prepared APKs ==="
          ls -lh release-apks/
          test -n "$(ls -A release-apks/*.apk 2>/dev/null)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-temp-installable-release-apk
          path: release-apks/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          tag_name: temp-installable-${{ github.run_id }}
          name: "KornDog Temp Installable Build #${{ github.run_number }}"
          body: |
            KornDog temporary installable release APK.

            This is a RELEASE build with bundled JS, signed using the debug signing config.

            Use this until the new real release keystore is created.

            If Android says app not installed, uninstall the previous KornDog/NouTube app first.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Complete
        run: echo "✅ Temp installable release APK ready"
