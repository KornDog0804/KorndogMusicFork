name: Build KornDog APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Bundle JS
        run: yarn bundle:es

      - name: Setup signing
        run: |
          echo '' | base64 -d > android/app/korndog-release.keystore

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx7g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"
        working-directory: android
        env:
          GRADLE_OPTS: "-Xmx7g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-apk
          path: android/app/build/outputs/apk/release/*arm64-v8a*.apk
          retention-days: 30
