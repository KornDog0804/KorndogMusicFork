name: Build KornDog APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install and prebuild
        run: |
          yarn install
          yarn bundle:es
          yarn expo prebuild -p android --clean --no-install

      - name: Setup signing
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/korndog-release.keystore
            cat >> android/app/build.gradle << 'EOF'
          android.signingConfigs.create("release") {
              storeFile = file("korndog-release.keystore")
              storePassword = "KornDog2024!"
              keyAlias = "korndog"
              keyPassword = "KornDog2024!"
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.getByName("release")
          EOF
          else
            echo 'android.buildTypes.release.signingConfig = android.signingConfigs.debug' >> android/app/build.gradle
          fi
          echo 'android.packagingOptions.jniLibs.useLegacyPackaging = true' >> android/app/build.gradle

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
