name: Build KornDog APK

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Cache ~/.gradle/wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}
          restore-keys: gradle-wrapper-${{ runner.os }}

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Setup Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KORNDOG_KEYSTORE }}" | base64 -d > android/app/korndog-release.keystore

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon \
            -x lint \
            -x lintVital \
            --stacktrace

      - name: Prepare Release
        run: |
          mkdir -p release-apks
          find android/app/build/outputs/apk/release -name "*-release.apk" ! -name "*unsigned*" -exec cp {} release-apks/ \;
          ls -lh release-apks/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*-release.apk
          tag_name: build-${{ github.run_id }}
          name: "KornDog Build #${{ github.run_number }}"
          body: |
            🤘 **KornDog APK Build**
            
            **Install:** `adb install -r KornDog*.apk`
            **Features:** Cast to TV, Auto-play fix, Audio norm, Easter egg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Time
        run: echo "✅ Build complete in under 10 minutes"
