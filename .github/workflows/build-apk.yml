name: Build KornDog APK Debug Installable

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-debug-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
            ~/.cache/metro
            .expo
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Prebuild Android If Needed
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --no-install
          fi

      - name: Setup Gradle Memory
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.caching=true
          kotlin.incremental=true
          EOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --build-cache \
            --parallel \
            --stacktrace

      - name: Find Debug APK Files
        run: |
          echo "=== Debug APK files ==="
          find android/app/build/outputs -type f -name "*debug*.apk" -print -exec ls -lh {} \;

      - name: Prepare Debug APK
        run: |
          rm -rf debug-apks
          mkdir -p debug-apks
          find android/app/build/outputs -type f -name "*debug*.apk" -exec cp {} debug-apks/ \;
          ls -lh debug-apks/
          test -n "$(ls -A debug-apks/*.apk 2>/dev/null)"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-debug-installable-apk
          path: debug-apks/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload GitHub Debug Release
        uses: softprops/action-gh-release@v1
        with:
          files: debug-apks/*.apk
          tag_name: debug-build-${{ github.run_id }}
          name: "KornDog Debug Build #${{ github.run_number }}"
          body: |
            KornDog debug APK build.

            This is installable because debug APKs are signed with Android's debug key.

            Install:
            adb install -r app-arm64-v8a-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Complete
        run: echo "✅ Debug APK ready"
