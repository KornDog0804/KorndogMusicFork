name: Build KornDog APK Temp Installable

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-temp-installable
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
            ~/.cache/metro
            .expo
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Prebuild Android If Needed
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --no-install
          fi

      - name: Setup Gradle Memory
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.caching=true
          kotlin.incremental=true
          EOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --stacktrace

      - name: Find APK Files
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Sign Unsigned Release APK With Debug Key
        run: |
          rm -rf release-apks
          mkdir -p release-apks

          APK_IN=$(find android/app/build/outputs -type f -name "*arm64*release-unsigned.apk" | head -1)

          if [ -z "$APK_IN" ]; then
            APK_IN=$(find android/app/build/outputs -type f -name "*.apk" | head -1)
          fi

          if [ -z "$APK_IN" ]; then
            echo "No APK found."
            exit 1
          fi

          echo "Using APK: $APK_IN"

          mkdir -p ~/.android

          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "Using build tools: $BUILD_TOOLS"

          "$BUILD_TOOLS/zipalign" -f -p 4 "$APK_IN" release-apks/app-arm64-v8a-release-aligned.apk

          "$BUILD_TOOLS/apksigner" sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out release-apks/app-arm64-v8a-release-debugsigned.apk \
            release-apks/app-arm64-v8a-release-aligned.apk

          "$BUILD_TOOLS/apksigner" verify --verbose release-apks/app-arm64-v8a-release-debugsigned.apk

          rm -f release-apks/app-arm64-v8a-release-aligned.apk

          echo "=== Final installable APK ==="
          ls -lh release-apks/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-temp-installable-apk
          path: release-apks/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          tag_name: temp-installable-${{ github.run_id }}
          name: "KornDog Temp Installable Build #${{ github.run_number }}"
          body: |
            🤘 KornDog temporary installable APK.

            This is a release build with bundled JS, manually signed using Android debug signing.

            **Install this file:** app-arm64-v8a-release-debugsigned.apk

            If Android says app not installed, uninstall the previous KornDog/NouTube app first.

            `adb install -r app-arm64-v8a-release-debugsigned.apk`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Complete
        run: echo "✅ Temp installable APK ready"
