name: Build KornDog APK Signed Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-signed-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
            ~/.cache/metro
            .expo
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Prebuild Android If Needed
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --no-install
          fi

      - name: Decode Keystore to android/app
        run: |
          mkdir -p android/app
          echo "${{ secrets.KORNDOG_KEYSTORE_B64 }}" | base64 -d > android/app/korndog-release.keystore
          ls -lh android/app/korndog-release.keystore

      - name: Setup Gradle Memory
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.caching=true
          kotlin.incremental=true
          EOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/korndog-release.keystore \
            -Pandroid.injected.signing.store.password="KornDog2024!" \
            -Pandroid.injected.signing.key.alias="korndog" \
            -Pandroid.injected.signing.key.password="KornDog2024!" \
            --build-cache \
            --parallel \
            --stacktrace

      - name: Find APK Files
        run: |
          find android/app/build/outputs -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Copy Signed ARM64 APK
        run: |
          mkdir -p release-apks
          SIGNED_APK=$(find android/app/build/outputs -type f -name "*arm64*v8a*release*.apk" ! -name "*unsigned*" | head -1)
          if [ -z "$SIGNED_APK" ]; then
            echo "No signed APK found"
            exit 1
          fi
          cp "$SIGNED_APK" release-apks/app-arm64-v8a-release-signed.apk
          ls -lh release-apks/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-signed-release-apk
          path: release-apks/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          tag_name: ghostkernel-v0.7.3-${{ github.run_id }}
          name: "🎵 GhostKernel v0.7.3 - KornDog YouTube Music"
          body: |
            # KornDog GhostKernel v0.7.3

            **What's New:**
            - ✅ Deep purple (#160026) + lime green (#39ff14) theme
            - ✅ Improved song data extraction (artist, title, album art)
            - ✅ Generator button repositioned (top:132px)
            - ✅ Audio boost maintained (2.0x gain + DynamicsCompressor)
            - ✅ Buffer watchdog for seamless playback
            - ✅ YouTube Music Premium features fully intact

            **Features:**
            - 📺 One-tap generator button
            - 🎨 KornDog GhostKernel color scheme
            - 🔊 2.0x audio boost
            - 🎵 All native YouTube Music controls
            - 📡 Native cast support
            - 👆 Swipe to change songs
            - ⚡ Zero control interference

            **Installation:**
            ```
            adb install -r app-arm64-v8a-release-signed.apk
            ```

            **Build:** Signed release (v0.7.3-GhostKernel, versionCode 50)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
