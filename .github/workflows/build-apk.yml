name: Build KornDog APK v2 Beast

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: korndog-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
      JAVA_TOOL_OPTIONS: -Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache/yarn
            ~/.cache/metro
            .expo
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android Build Outputs
        uses: actions/cache@v4
        with:
          path: |
            android/app/.cxx
            android/build
            android/app/build
          key: android-build-${{ runner.os }}-${{ hashFiles('android/**/*.kt', 'android/**/*.java', 'android/**/*.xml', 'app/**/*.tsx', 'app/**/*.ts', 'components/**/*.tsx', 'components/**/*.ts') }}
          restore-keys: |
            android-build-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Detect gradlew
        id: gradlewcheck
        run: |
          if [ -f android/gradlew ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Prebuild Android if Missing
        if: steps.gradlewcheck.outputs.exists == 'false'
        run: yarn expo prebuild -p android --no-install

      - name: Patch Gradle Memory and Cache Settings
        run: |
          cat >> android/gradle.properties << 'EOF'

          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          org.gradle.daemon=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.caching=true
          kotlin.incremental=true
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Setup Signing From Secret
        run: |
          mkdir -p android/app
          echo "${{ secrets.KORNDOG_KEYSTORE }}" | base64 -d > android/app/korndog-release.keystore
          ls -lh android/app/korndog-release.keystore

      - name: Force Signed ARM64 Release Build
        run: |
          python3 - << 'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle")
          s = p.read_text()

          if "signingConfigs {" not in s:
              s = s.replace(
                  "android {",
                  """android {
              signingConfigs {
                  release {
                      storeFile file('korndog-release.keystore')
                      storePassword 'KornDog2024!'
                      keyAlias 'korndog'
                      keyPassword 'KornDog2024!'
                  }
              }
          """,
                  1
              )

          if "signingConfig signingConfigs.release" not in s:
              s = s.replace(
                  "release {",
                  """release {
                      signingConfig signingConfigs.release""",
                  1
              )

          if "splits {" not in s:
              s = s.replace(
                  "android {",
                  """android {
              splits {
                  abi {
                      reset()
                      enable true
                      include "arm64-v8a"
                      universalApk false
                  }
              }
          """,
                  1
              )

          p.write_text(s)
          PY

          echo "---- signing/splits check ----"
          grep -n "signingConfigs\\|signingConfig signingConfigs.release\\|splits\\|arm64-v8a" android/app/build.gradle || true

      - name: Verify Android Files
        run: |
          ls -la android
          ls -la android/gradlew
          ls -lh android/app/korndog-release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Signed ARM64 APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon \
            --configure-on-demand \
            --stacktrace

      - name: Show APK Outputs
        run: |
          find android/app/build/outputs/apk/release -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Upload Signed ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: korndog-noutube-arm64-signed-apk
          path: |
            android/app/build/outputs/apk/release/*arm64-v8a*release*.apk
            !android/app/build/outputs/apk/release/*unsigned*.apk
          retention-days: 30
